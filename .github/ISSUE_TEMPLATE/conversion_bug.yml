name: Conversion bug
description: Report a reproducible document operation problem using synthetic or sanitized inputs only.
title: "[conversion]: "
labels: ["conversion"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Pagewright. Do not attach private documents, real customer files, credentials, private URLs, or proprietary data. Use synthetic files, files generated by the public proof, or a minimal sanitized reproduction.
  - type: dropdown
    id: operation
    attributes:
      label: Operation
      description: Which operation is affected?
      options:
        - merge
        - split
        - rotate
        - images-to-pdf
        - pdf-to-images
        - metadata
        - other
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should Pagewright have produced?
      placeholder: "Example: two synthetic PDFs merge into one three-page PDF."
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Synthetic reproduction
      description: Provide commands, generated fixture details, or a sanitized proof manifest. Do not include private files or local absolute output paths.
      placeholder: |
        .\.venv\Scripts\python.exe examples\synthetic_proof.py
        .\.venv\Scripts\python.exe examples\check_synthetic_proof.py
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Share non-sensitive environment details.
      placeholder: "OS, Python version, Pagewright commit, browser if using the UI."
    validations:
      required: false
  - type: checkboxes
    id: safety
    attributes:
      label: Public-safety checklist
      options:
        - label: I used synthetic or sanitized inputs only.
          required: true
        - label: I did not attach private documents, credentials, private URLs, or proprietary data.
          required: true
        - label: I removed local absolute output paths from logs and manifests.
          required: true
