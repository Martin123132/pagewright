name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Ruff and Pytest
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e ".[dev,api]"

      - name: Run Ruff
        run: python -m ruff check .

      - name: Run Pytest
        run: python -m pytest

      - name: Run synthetic proof check
        run: python examples\check_synthetic_proof.py

      - name: Run public readiness check
        run: python examples\check_public_readiness.py
